<div class="dashboard-grid">

    <!-- Daily Quote -->
    <div class="glass-card panel-quote">
        {% include 'hub/_quote.html' %}
    </div>

    <!-- Weather & Calendar -->
    <div class="glass-card panel-weather">
        {% include 'hub/_weather.html' %}
    </div>

    <!-- Messages & Suggestions -->
    <div class="glass-card panel-suggestions">
        {% include 'hub/_suggestions.html' %}
    </div>

    <!-- To-Do List -->
    <div class="glass-card panel-todo">
        <div class="panel-header">
            <h3>
                <i data-lucide="check-square" class="panel-icon"></i>
                To-Do List
            </h3>
            <div class="panel-menu">
                <button class="menu-dots" onclick="toggleTodoForm()">⋯</button>
                <div class="menu-dropdown" id="todo-menu-dropdown">
                    <button onclick="toggleTodoForm()">+ Create To-Do</button>
                </div>
            </div>
        </div>

        <form id="todo-create-form"
              class="todo-inline-form hidden"
              hx-post="{% url 'todo-create' %}"
              hx-target="#todo-list-wrap"
              hx-swap="innerHTML"
              hx-on::after-request="this.reset(); this.classList.add('hidden')">

              {% csrf_token %}

            <input type="text" name="title" placeholder="What needs doing?" required>
            <input type="text" name="detail" placeholder="Optional detail (e.g. 10 AM)">
            <button type="submit" class="btn btn-primary btn-sm">Add</button>
        </form>

        <div id="todo-list-wrap">
            {% include 'hub/_todo_list.html' %}
        </div>
    </div>

</div>
