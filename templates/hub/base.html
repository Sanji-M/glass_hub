<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}GlassHub{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>


<body>

    <div class="bg-layer"></div>

    <nav class="glass-nav">

        <div class="nav-left">
            <!-- music player placeholder — Phase 3 Step C -->
            <div class="music-player" id="music-player">

    <div class="player-art" id="player-art">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
        </svg>
    </div>

    <div class="player-info">
        <span class="player-title" id="player-title">No Track</span>
        <span class="player-artist" id="player-artist">Select a song</span>
    </div>

    <div class="player-controls">
        <button class="player-btn" id="prev-btn" onclick="prevTrack()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
        </button>

        <button class="player-btn player-btn-main" id="play-btn" onclick="togglePlay()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="play-icon">
                <path d="M8 5v14l11-7z"/>
            </svg>
        </button>

        <button class="player-btn" id="next-btn" onclick="nextTrack()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zm2.5-6 8.5 6V6z"/>
            </svg>
        </button>


        <button class="player-btn volume-btn" onclick="volumeDown()">🔉</button>
        <button class="player-btn volume-btn" onclick="volumeUp()">🔊</button>
    </div>

<!-----Added-------------------------------------------------------------------------------------------------->
  


    <div class="player-progress-wrap">
        <input type="range" class="player-progress" id="progress-bar"
               value="0" min="0" max="100" step="0.1"
               oninput="seekTo(this.value)">
        <span class="player-time" id="player-time">0%</span>
    </div>

    <!-- Hidden audio engine -->
    <audio id="audio-engine" preload="metadata"></audio>

    <!-- Track data from Django passed to JS -->
    <script id="track-data" type="application/json">
        [{% for track in tracks %}
            {
                "title":  "{{ track.title }}",
                "artist": "{{ track.artist }}",
                "genre":  "{{ track.genre }}",
                "url":    "{{ track.audio_file.url }}"
            }{% if not forloop.last %},{% endif %}
        {% endfor %}]
    </script>

</div>
        </div>

        <div class="nav-links">
            <a href="{% url 'dashboard' %}"
               hx-get="{% url 'dashboard' %}"
               hx-target="#content"
               hx-swap="innerHTML"
               hx-push-url="true"
               class="nav-link">Home</a>

            <a href="{% url 'board' %}"
               hx-get="{% url 'board' %}"
               hx-target="#content"
               hx-swap="innerHTML"
               hx-push-url="true"
               class="nav-link">Board</a>

            <a href="{% url 'settings' %}"
               hx-get="{% url 'settings' %}"
               hx-target="#content"
               hx-swap="innerHTML"
               hx-push-url="true"
               class="nav-link">Settings</a>
        </div>

        <div class="nav-right">
            <span class="nav-icon nav-search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </span>

            <span class="nav-icon nav-chat" id="chat-toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </span>

            <div class="nav-profile">
                <span class="profile-name">{{ request.user.first_name }}</span>
                <div class="profile-avatar">
                    <span class="online-dot"></span>
                </div>
            </div>
        </div>

    </nav>

    <main id="content" class="main-content">
        {% block content %}{% endblock %}
    </main>



    <script>
    // ── Load track data from Django ──────────────────────────
    const trackData = document.getElementById('track-data');
    const tracks = trackData ? JSON.parse(trackData.textContent) : [];

    const audio     = document.getElementById('audio-engine');
    const playIcon  = document.getElementById('play-icon');
    const titleEl   = document.getElementById('player-title');
    const artistEl  = document.getElementById('player-artist');
    const progressEl= document.getElementById('progress-bar');
    const timeEl    = document.getElementById('player-time');

    let currentIndex = 0;
    let isPlaying    = false;
    audio.volume = 0.7;

    // ── Load a track by index ────────────────────────────────
    function loadTrack(index) {
        if (!tracks.length) return;
        const track      = tracks[index];
        audio.src        = track.url;
        titleEl.textContent  = track.title;
        artistEl.textContent = track.artist;
        progressEl.value = 0;
        timeEl.textContent   = '0%';
    }



     

    // ── Play / Pause ─────────────────────────────────────────
    function togglePlay() {
        if (!tracks.length) return;
        if (audio.src === '' || !audio.src.includes('tracks')) {
            loadTrack(currentIndex);
        }
        if (isPlaying) {
            audio.pause();
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        } else {
            audio.play();
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        }
        isPlaying = !isPlaying;
    }

    // ── Next track ───────────────────────────────────────────
    function nextTrack() {
        currentIndex = (currentIndex + 1) % tracks.length;
        loadTrack(currentIndex);
        if (isPlaying) audio.play();
    }

    // ── Prev track ───────────────────────────────────────────
    function prevTrack() {
        currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(currentIndex);
        if (isPlaying) audio.play();
    }

    //---Volumeup
    function volumeUp() {
        audio.volume = Math.min(audio.volume + 0.1, 1);
    }

    //--VolumeDown
    function volumeDown() {

        audio.volume = Math.max(audio.volume - 0.1, 0);
    }


    // ── Seek ─────────────────────────────────────────────────
    function seekTo(value) {
        if (audio.duration) {
            audio.currentTime = (value / 100) * audio.duration;
        }
    }

    // ── Update progress bar as song plays ────────────────────
    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const pct        = (audio.currentTime / audio.duration) * 100;
            progressEl.value = pct;
            timeEl.textContent = Math.round(pct) + '%';
        }
    });

    // ── Auto next when song ends ─────────────────────────────
    audio.addEventListener('ended', () => {
        nextTrack();
    });

    // ── Load first track info on page load ───────────────────
    if (tracks.length) loadTrack(0);
</script>

</body>
</html>
