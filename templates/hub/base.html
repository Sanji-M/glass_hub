<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}GlassHub{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>


<body>



<script>
document.body.addEventListener('htmx:configRequest', (event) => {
    event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
});
</script>

<div class="app-shell">

    <!-- ═══════════════════════════════════════
         SIDEBAR
    ═══════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">

        <!-- Top: logo + toggle -->
        <div class="sidebar-top">
            <div class="sidebar-logo">
                <span class="logo-icon">
                    <i data-lucide="layout-dashboard"></i>
                </span>
                <span class="logo-text">GlassHub</span>
            </div>
            <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">
                <i data-lucide="panel-left"></i>
            </button>
        </div>

        <!-- Nav links -->
        <nav class="sidebar-nav">
            <a href="{% url 'dashboard' %}"
               hx-get="{% url 'dashboard' %}"
               hx-target="#content"
               hx-swap="innerHTML"
               hx-push-url="true"
               class="sidebar-link" id="nav-dashboard">
                <i data-lucide="house"></i>
                <span class="link-label">Dashboard</span>
            </a>

            <a href="{% url 'board' %}"
               hx-get="{% url 'board' %}"
               hx-target="#content"
               hx-swap="innerHTML"
               hx-push-url="true"
               class="sidebar-link" id="nav-board">
                <i data-lucide="layout-list"></i>
                <span class="link-label">Board</span>
            </a>

            <a href="{% url 'settings' %}"
               hx-get="{% url 'settings' %}"
               hx-target="#content"
               hx-swap="innerHTML"
               hx-push-url="true"
               class="sidebar-link" id="nav-settings">
                <i data-lucide="settings"></i>
                <span class="link-label">Settings</span>
            </a>
        </nav>

        <!-- Bottom: profile -->
        <div class="sidebar-bottom">
            <div class="sidebar-profile">
                <div class="profile-avatar">
                    <span class="online-dot"></span>
                </div>
                <span class="link-label profile-name">{{ request.user.first_name }}</span>
            </div>
        </div>

    </aside>

    <!-- ═══════════════════════════════════════
         MAIN WRAPPER
    ═══════════════════════════════════════ -->
    <div class="main-wrapper">

        <main id="content" class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- ═══════════════════════════════════
             MUSIC PLAYER — bottom bar
        ═══════════════════════════════════ -->
        <div class="music-player" id="music-player">

            <div class="player-art" id="player-art">
                <i data-lucide="music"></i>
            </div>

            <div class="player-info">
                <span class="player-title" id="player-title">No Track</span>
                <span class="player-artist" id="player-artist">Select a song</span>
            </div>

            <div class="player-controls">
                <button class="player-btn" id="prev-btn" onclick="prevTrack()">
                    <i data-lucide="skip-back"></i>
                </button>
                <button class="player-btn player-btn-main" id="play-btn" onclick="togglePlay()">
                    <i data-lucide="play" id="play-icon-i"></i>
                </button>
                <button class="player-btn" id="next-btn" onclick="nextTrack()">
                    <i data-lucide="skip-forward"></i>
                </button>
                <button class="player-btn" onclick="volumeDown()">
                    <i data-lucide="volume-1"></i>
                </button>
                <button class="player-btn" onclick="volumeUp()">
                    <i data-lucide="volume-2"></i>
                </button>
            </div>

            <div class="player-progress-wrap">
                <input type="range" class="player-progress" id="progress-bar"
                       value="0" min="0" max="100" step="0.1"
                       oninput="seekTo(this.value)">
                <span class="player-time" id="player-time">0%</span>
            </div>

            <audio id="audio-engine" preload="metadata"></audio>

            <script id="track-data" type="application/json">
                [{% for track in tracks %}
                    {
                        "title":  "{{ track.title }}",
                        "artist": "{{ track.artist }}",
                        "genre":  "{{ track.genre }}",
                        "url":    "{{ track.audio_file.url }}"
                    }{% if not forloop.last %},{% endif %}
                {% endfor %}]
            </script>

        </div>
        <!-- end music-player -->

    </div>
    <!-- end main-wrapper -->

</div>
<!-- end app-shell -->



 <script>
// ── Sidebar toggle ───────────────────────────────────
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('collapsed');
}

// ── Active nav link highlight ────────────────────────
function setActiveLink() {
    const path = window.location.pathname;
    document.querySelectorAll('.sidebar-link').forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === path) {
            link.classList.add('active');
        }
    });
}

document.addEventListener('DOMContentLoaded', setActiveLink);
document.addEventListener('htmx:pushedIntoHistory', setActiveLink);

// ── Load track data from Django ──────────────────────
const trackData = document.getElementById('track-data');
const tracks = trackData ? JSON.parse(trackData.textContent) : [];

const audio      = document.getElementById('audio-engine');
const titleEl    = document.getElementById('player-title');
const artistEl   = document.getElementById('player-artist');
const progressEl = document.getElementById('progress-bar');
const timeEl     = document.getElementById('player-time');
const playIconEl = document.getElementById('play-icon-i');

let currentIndex = 0;
let isPlaying    = false;
audio.volume = 0.7;

function loadTrack(index) {
    if (!tracks.length) return;
    const track = tracks[index];
    audio.src = track.url;
    titleEl.textContent  = track.title;
    artistEl.textContent = track.artist;
    progressEl.value     = 0;
    timeEl.textContent   = '0%';
}

function togglePlay() {
    if (!tracks.length) return;
    if (audio.src === '' || !audio.src.includes('tracks')) {
        loadTrack(currentIndex);
    }
 if (isPlaying) {
    audio.pause();
    playIconEl.setAttribute('data-lucide', 'play');
} else {
    audio.play();
    playIconEl.setAttribute('data-lucide', 'pause');
}
lucide.createIcons();
    isPlaying = !isPlaying;
}

function nextTrack() {
    currentIndex = (currentIndex + 1) % tracks.length;
    loadTrack(currentIndex);
    if (isPlaying) audio.play();
}

function prevTrack() {
    currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
    loadTrack(currentIndex);
    if (isPlaying) audio.play();
}

function volumeUp()   { audio.volume = Math.min(audio.volume + 0.1, 1); }
function volumeDown() { audio.volume = Math.max(audio.volume - 0.1, 0); }

function seekTo(value) {
    if (audio.duration) {
        audio.currentTime = (value / 100) * audio.duration;
    }
}

audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressEl.value   = pct;
        timeEl.textContent = Math.round(pct) + '%';
    }
});

audio.addEventListener('ended', () => { nextTrack(); });

if (tracks.length) loadTrack(0);

function toggleTodoForm() {
    const form = document.getElementById('todo-create-form');
    if (form) form.classList.toggle('hidden');
}
</script>
<script>lucide.createIcons();</script>
</body>
</html>
