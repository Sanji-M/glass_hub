<div class="memories-page">
    <div class="memory-backdrop" id="memory-backdrop"></div>
    <div class="memories-header">
        <div>
            <h1>Memories</h1>
            <p>Things worth remembering.</p>
        </div>
        <button class="btn btn-primary"
                onclick="document.getElementById('memory-create-form').classList.toggle('hidden')">
            <i data-lucide="plus"></i>
            Add Memory
        </button>
    </div>

    <!-- Create form -->
    <div id="memory-create-form" class="memory-form-wrap hidden">
        <form hx-post="{% url 'memory-create' %}"
              hx-target="#memory-grid"
              hx-swap="innerHTML"
              hx-on::after-request="this.reset(); document.getElementById('memory-create-form').classList.add('hidden')">
            {% csrf_token %}
            <textarea name="content" placeholder="What's on your mind?" rows="3" required></textarea>
            <button type="submit" class="btn btn-primary btn-sm">Save Memory</button>
        </form>
    </div>

    <!-- Memory grid -->
    <div id="memory-grid">
        {% include 'hub/_memory_card.html' %}
    </div>

</div>
