<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up — GlassHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-avatar">
            <img src="{% static 'images/default-avatar.jpg' %}" alt="avatar">
        </div>

        <h1 class="auth-title">Create Your Account</h1>
        <p class="auth-subtitle">Get started with your Digital Wall.</p>

        <form method="post" class="auth-form">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="auth-errors">{{ form.non_field_errors }}</div>
            {% endif %}

            <div class="form-group">
                <label class="form-label">Enter your full name...</label>
                {{ form.full_name }}
            </div>

            <div class="form-group">
                <label class="form-label">Choose a Password</label>
                {{ form.password1 }}
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                {{ form.password2 }}
            </div>

            <button type="submit" class="auth-btn">CREATE ACCOUNT</button>
        </form>

        <span class="auth-link">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </span>

    </div>
</div>
</body>
</html>
